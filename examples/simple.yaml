# Simple - 기본 전투기
# 가장 단순한 행동트리 (참가자 시작점)
name: "simple"
version: "1.0.0"
description: "Hard Deck 회피 + 기본 추적만 하는 단순 전투기"

tree:
  type: Selector
  children:
    # 1. Hard Deck 회피 (필수)
    - type: Sequence
      children:
        - type: Condition
          name: BelowHardDeck
        - type: Action
          name: ClimbTo
          params:
            target_altitude_ft: 3000
    
    # 2. 기본 추적
    - type: Action
      name: Pursue
