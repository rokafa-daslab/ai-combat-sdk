# Ace - 경진대회 기준 AI (Champion)
# 참가자들이 상대할 최강 행동트리
name: "ace"
version: "1.0.0"
description: "BFM 상황 인식 + Gun WEZ 최적화 + 에너지 관리를 결합한 최강 전투기"

tree:
  type: Selector
  children:
    # =====================================================
    # 1. CRITICAL: Hard Deck 회피 (최우선 - 패배 방지)
    # =====================================================
    - type: Sequence
      name: "HardDeckAvoidance"
      children:
        - type: Condition
          name: BelowHardDeck
        - type: Action
          name: ClimbTo
          params:
            target_altitude_ft: 3000  # Hard Deck 1000ft 이상

    # =====================================================
    # 2. Gun WEZ 조건 충족 시 정밀 공격 (승리 조건)
    # =====================================================
    - type: Sequence
      name: "GunAttackSequence"
      children:
        - type: Condition
          name: DistanceBelow
          params:
            threshold_ft: 3000  # ft (WEZ 최대 3000ft)
        - type: Condition
          name: DistanceAbove
          params:
            threshold_ft: 500   # ft (WEZ 최소 500ft)
        - type: Condition
          name: ATABelow
          params:
            threshold_deg: 15  # 전방 15도 이내
        - type: Action
          name: GunAttack

    # =====================================================
    # 3. DBFM (방어 BFM) - 불리한 상황 대응
    # =====================================================
    - type: Sequence
      name: "DefensiveBFM"
      children:
        - type: Condition
          name: IsDefensiveSituation
        - type: Selector
          children:
            # 3-1. 심각한 위협 (AA > 130) - 급선회 회피
            - type: Sequence
              children:
                - type: Condition
                  name: UnderThreat
                  params:
                    aa_threshold_deg: 130.0
                - type: Action
                  name: BreakTurn

            # 3-2. 위협 상황 (AA > 100) - 방어 기동
            - type: Sequence
              children:
                - type: Condition
                  name: UnderThreat
                  params:
                    aa_threshold_deg: 100.0
                - type: Action
                  name: DefensiveManeuver

            # 3-3. 고도 열세 - HighYoYo로 에너지 확보
            - type: Sequence
              children:
                - type: Condition
                  name: AltitudeBelow
                  params:
                    min_altitude_ft: 16404  # 5000m → 16404ft
                - type: Action
                  name: HighYoYo

            # 3-4. 기본 방어 - 고도 우위 확보
            - type: Action
              name: AltitudeAdvantage
              params:
                target_advantage_ft: 1969  # 600m → 1969ft

    # =====================================================
    # 4. OBFM (공격 BFM) - 유리한 상황 활용
    # =====================================================
    - type: Sequence
      name: "OffensiveBFM"
      children:
        - type: Condition
          name: IsOffensiveSituation
        - type: Selector
          children:
            # 4-1. 근거리 (< 4921ft) - Lead Pursuit
            - type: Sequence
              children:
                - type: Condition
                  name: DistanceBelow
                  params:
                    threshold_ft: 4921  # 1500m → 4921ft
                - type: Action
                  name: LeadPursuit

            # 4-2. 중거리 (< 9843ft) + 적이 측면 - One Circle Fight
            - type: Sequence
              children:
                - type: Condition
                  name: DistanceBelow
                  params:
                    threshold_ft: 9843  # 3000m → 9843ft
                - type: Condition
                  name: ATAAbove
                  params:
                    threshold_deg: 30
                - type: Action
                  name: OneCircleFight

            # 4-3. 중거리 (< 13123ft) - Lag Pursuit (에너지 관리)
            - type: Sequence
              children:
                - type: Condition
                  name: DistanceBelow
                  params:
                    threshold_ft: 13123  # 4000m → 13123ft
                - type: Action
                  name: LagPursuit

            # 4-4. 원거리 - 고도 우위 유지하며 추적
            - type: Parallel
              policy: SuccessOnOne
              children:
                - type: Action
                  name: Pursue
                - type: Action
                  name: AltitudeAdvantage
                  params:
                    target_advantage_ft: 1312  # 400m → 1312ft

    # =====================================================
    # 5. HABFM (정면/고측면 BFM) - 대등한 상황
    # =====================================================
    - type: Sequence
      name: "NeutralBFM"
      children:
        - type: Condition
          name: IsNeutralSituation
        - type: Selector
          children:
            # 5-1. 고도 열세 - 상승 선회로 우위 확보
            - type: Sequence
              children:
                - type: Condition
                  name: AltitudeBelow
                  params:
                    min_altitude_ft: 11483  # 3500m → 11483ft
                - type: Action
                  name: ClimbingTurn
                  params:
                    direction: auto

            # 5-2. 높은 ATA (>60) - HighYoYo로 Lufbery 탈출
            - type: Sequence
              children:
                - type: Condition
                  name: ATAAbove
                  params:
                    threshold_deg: 60
                - type: Action
                  name: HighYoYo

            # 5-3. 근거리 + 낮은 ATA - One Circle Fight
            - type: Sequence
              children:
                - type: Condition
                  name: DistanceBelow
                  params:
                    threshold_ft: 8202  # 2500m → 8202ft
                - type: Action
                  name: OneCircleFight

            # 5-4. 기본 - Lead Pursuit
            - type: Action
              name: LeadPursuit

    # =====================================================
    # 6. 기본 추적 (상황 판단 불가 시)
    # =====================================================
    - type: Action
      name: Pursue
